<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>키키의 책장</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1F4D3F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.1/tesseract.min.js"></script>
<style>
  :root{
    --paper:#F7F4EC; --panel:#FFFFFF;
    --cloth:#1F4D3F; --cloth-2:#2E6651;
    --ink:#23231E; --muted:#76786C; --line:#E5DFCF;
    --mark:#FFE94D; --mark-deep:#E6CE00; --danger:#A8442E;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{background:var(--paper);color:var(--ink);
    font-family:"Apple SD Gothic Neo","Malgun Gothic","Pretendard",-apple-system,system-ui,sans-serif;
    line-height:1.55;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:680px;margin:0 auto;padding:24px 18px 90px;}

  /* 로그인 화면 */
  #authView{display:none;min-height:80vh;align-items:center;justify-content:center;}
  .auth-card{text-align:center;background:var(--panel);border:1px solid var(--line);border-radius:18px;
    padding:40px 28px;max-width:360px;width:100%;}
  .auth-card .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--cloth);font-weight:700;}
  .auth-card h1{font-size:28px;margin:6px 0 4px;font-weight:800;font-family:"Nanum Myeongjo",Georgia,serif;}
  .auth-card p{color:var(--muted);font-size:14px;margin:0 0 24px;}
  .gbtn{display:inline-flex;align-items:center;gap:10px;background:#fff;color:#23231E;border:1px solid #D8D2C2;
    border-radius:10px;padding:12px 18px;font-weight:700;font-size:15px;cursor:pointer;}
  .gbtn:hover{background:#FAF8F2;}
  .gbtn svg{width:18px;height:18px;}
  .auth-note{font-size:11.5px;color:var(--muted);margin-top:18px;line-height:1.5;}
  .config-warn{display:none;background:#FBEBE6;border:1px solid #E8C3B7;color:#8A3A24;
    border-radius:10px;padding:12px;font-size:12.5px;margin-bottom:18px;text-align:left;line-height:1.5;}

  .topbar{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:18px;}
  .brand .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--cloth);font-weight:700;}
  .brand h1{font-size:26px;margin:2px 0 0;font-weight:800;letter-spacing:-.01em;
    font-family:"Nanum Myeongjo",Georgia,"Apple SD Gothic Neo",serif;}
  .userchip{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);white-space:nowrap;}
  .userchip button{background:none;border:none;color:var(--cloth);font-weight:700;cursor:pointer;font-size:12px;padding:2px 4px;}

  button{font-family:inherit;font-weight:700;cursor:pointer;border-radius:10px;
    border:1px solid var(--cloth);background:var(--cloth);color:#fff;font-size:14px;
    padding:11px 16px;transition:opacity .15s,transform .05s,background .15s;}
  button:active{transform:translateY(1px);}
  button:disabled{opacity:.4;cursor:not-allowed;}
  button.ghost{background:transparent;color:var(--cloth);border-color:var(--line);}
  button.ghost:hover{border-color:var(--cloth);}
  button.block{width:100%;padding:13px;font-size:15px;}

  .stats{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 16px 14px;margin-bottom:16px;}
  .stat-nums{display:flex;gap:8px;}
  .stat{flex:1;text-align:center;}
  .stat b{display:block;font-size:24px;font-weight:800;color:var(--cloth);line-height:1.1;font-family:"Nanum Myeongjo",Georgia,serif;}
  .stat small{font-size:11.5px;color:var(--muted);font-weight:600;}
  .minichart{display:flex;align-items:flex-end;gap:4px;height:54px;margin-top:14px;padding-top:4px;border-top:1px solid var(--line);}
  .mc-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end;}
  .mc-bar{width:100%;max-width:16px;background:var(--cloth-2);border-radius:3px 3px 0 0;min-height:2px;transition:height .3s;}
  .mc-bar.zero{background:var(--line);}
  .mc-lbl{font-size:9px;color:var(--muted);}
  .chart-cap{font-size:11px;color:var(--muted);font-weight:600;margin-top:10px;}

  .controls{display:flex;gap:8px;margin-bottom:14px;}
  .controls input{flex:1;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-family:inherit;font-size:14px;background:var(--panel);color:var(--ink);}
  .controls select{border:1px solid var(--line);border-radius:10px;padding:10px;background:var(--panel);font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--mark);border-color:transparent;}
  .filterbar{display:none;align-items:center;gap:8px;margin:-4px 0 14px;font-size:13px;color:var(--muted);}
  .filterbar .clear{background:none;border:none;color:var(--cloth);font-weight:700;cursor:pointer;padding:2px 4px;font-size:13px;}

  .empty{text-align:center;padding:56px 20px;color:var(--muted);}
  .empty .ic{font-size:42px;} .empty p{font-weight:700;margin:14px 0 4px;color:var(--ink);} .empty small{font-size:13px;}
  .card{display:flex;gap:14px;background:var(--panel);border:1px solid var(--line);border-left:5px solid var(--cloth);border-radius:12px;padding:14px;margin-bottom:14px;}
  .cover{width:62px;height:88px;border-radius:5px;flex:0 0 auto;object-fit:cover;
    background:linear-gradient(135deg,var(--cloth),var(--cloth-2));display:flex;align-items:center;justify-content:center;color:#cde3d8;font-size:22px;}
  .card .body{flex:1;min-width:0;}
  .card .ttl{font-weight:800;font-size:16px;line-height:1.3;font-family:"Nanum Myeongjo",Georgia,serif;}
  .card .meta{font-size:12.5px;color:var(--muted);margin:2px 0 8px;}
  .quote{font-size:13.5px;line-height:1.7;color:#4a4a42;}
  .thought{font-size:13.5px;line-height:1.6;color:#3a3a32;white-space:pre-wrap;margin-top:8px;}
  .stars{color:var(--mark-deep);font-size:14px;letter-spacing:1px;}
  .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px;}
  .tag{font-size:11px;font-weight:700;color:var(--cloth);background:#EAF1ED;border:1px solid #D6E4DC;padding:2px 8px;border-radius:99px;cursor:pointer;}
  .tag:hover{background:#DCE9E2;}
  .card .row2{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
  .card-acts{display:flex;gap:4px;}
  .mini{background:none;border:none;color:var(--muted);font-size:12px;font-weight:700;padding:4px 6px;cursor:pointer;}
  .mini:hover{color:var(--cloth);} .mini.del:hover{color:var(--danger);}

  .editor{display:none;}
  .editor h2{font-size:18px;margin:0 0 18px;font-weight:800;font-family:"Nanum Myeongjo",Georgia,serif;}
  .field{margin-bottom:16px;}
  label{display:block;font-size:13px;font-weight:700;margin-bottom:6px;}
  .hintlbl{font-weight:500;color:var(--muted);}
  input[type=text],input[type=date],input[type=number],textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-family:inherit;font-size:15px;color:var(--ink);background:#FCFBF6;}
  input[type=number]{-moz-appearance:textfield;} input[type=number]::-webkit-inner-spin-button{opacity:.4;}
  textarea{resize:vertical;min-height:70px;line-height:1.6;}
  .ttl-row{display:flex;gap:8px;} .ttl-row input{flex:1;}
  .pub-row{display:flex;gap:8px;} .pub-row .pub-f{flex:1;} .pub-row .pages-f{flex:0 0 88px;}
  .preview-cover{display:flex;gap:10px;align-items:flex-start;margin-top:10px;font-size:12.5px;color:var(--muted);overflow-x:auto;padding-bottom:4px;}
  .preview-cover img{width:46px;height:64px;object-fit:cover;border-radius:4px;}
  .cand-thumb{flex:0 0 auto;text-align:center;cursor:pointer;}
  .cand-thumb img{width:62px;height:88px;object-fit:cover;border-radius:6px;border:2.5px solid transparent;display:block;transition:border-color .15s,transform .1s;}
  .cand-thumb:hover img{border-color:var(--cloth-2);transform:translateY(-2px);}
  .cand-thumb.sel img{border-color:var(--cloth);box-shadow:0 0 0 2px var(--mark);}
  .cand-meta{font-size:10px;color:var(--muted);margin-top:4px;width:66px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .rate{display:flex;gap:4px;font-size:26px;cursor:pointer;user-select:none;color:#D8D2C2;}
  .rate span.on{color:var(--mark-deep);}
  .ocr{border:1px dashed #CFC8B5;border-radius:10px;padding:12px;background:#FCFBF6;margin-top:10px;}
  .ocr .hd{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;color:var(--muted);}
  .ocr .hd .dot{width:13px;height:13px;border-radius:3px;background:var(--mark);border:1px solid var(--mark-deep);}
  .ocr .acts{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
  .ocr button{font-size:13px;padding:9px 13px;}
  .canvas-box{position:relative;margin-top:10px;border-radius:10px;overflow:hidden;background:#000;line-height:0;touch-action:none;display:none;}
  canvas{display:block;width:100%;height:auto;cursor:crosshair;}
  .prog{display:none;margin-top:10px;} .prog .bar{height:5px;background:#EDE7D7;border-radius:99px;overflow:hidden;}
  .prog .bar i{display:block;height:100%;width:0;background:var(--mark-deep);transition:width .2s;}
  .prog .lbl{font-size:12px;color:var(--muted);margin-top:6px;font-weight:600;}
  .editor .footer{display:flex;gap:10px;margin-top:8px;} .editor .footer button{flex:1;}

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:10px 18px;border-radius:99px;font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:all .25s;z-index:50;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .note{font-size:12px;color:var(--muted);text-align:center;margin-top:24px;line-height:1.6;}
  .one-liner{font-style:italic;font-size:15px;border-left:3px solid var(--cloth);padding-left:12px;margin:6px 0 8px;color:var(--ink);line-height:1.5;}
  .quote-block{border-left:3px solid var(--mark);padding-left:10px;margin-bottom:10px;color:#4a4a42;line-height:1.7;font-size:13.5px;}
  .q-page-lbl{background:#FFF3B0;color:var(--cloth);font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;display:block;width:fit-content;margin-bottom:4px;}
  .quote-row{display:flex;gap:6px;align-items:flex-start;margin-bottom:8px;}
  .quote-row .q-text{flex:1;min-height:58px!important;}
  input.q-page{width:54px!important;padding:8px 6px!important;font-size:13px!important;text-align:center;}
</style>
</head>
<body>
<div class="wrap">

  <!-- ===== 로그인 화면 ===== -->
  <div id="authView">
    <div class="auth-card">
      <div class="config-warn" id="configWarn">
        ⚠️ Firebase 설정이 아직 안 들어갔어요. <code>index.html</code> 상단의
        <code>firebaseConfig</code>를 본인 프로젝트 값으로 바꿔주세요. (SETUP.md 참고)
      </div>
      <div class="eyebrow">Reading Journal</div>
      <h1>키키의 책장</h1>
      <p>읽은 책의 한 구절과 내 생각을 차곡차곡.</p>
      <button class="gbtn" id="signInBtn">
        <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Google로 로그인
      </button>
      <p class="auth-note">기록은 본인 계정에만 저장되고, 다른 사람은 볼 수 없어요.</p>
    </div>
  </div>

  <!-- ===== 앱 ===== -->
  <div id="appView" style="display:none;">
    <div class="topbar">
      <div class="brand"><div class="eyebrow">Reading Journal</div><h1>키키의 책장</h1></div>
      <div class="userchip"><span id="userEmail"></span><button id="signOutBtn">로그아웃</button></div>
    </div>

    <div id="listView">
      <div class="stats" id="stats"></div>
      <button class="block" id="newBtn">＋ 새 독서 기록</button>
      <div class="controls" style="margin-top:16px;">
        <input type="text" id="search" placeholder="제목·지은이·구절·태그 검색">
        <select id="sort">
          <option value="new">최신순</option>
          <option value="old">오래된순</option>
          <option value="rate">별점순</option>
          <option value="title">제목순</option>
        </select>
      </div>
      <div class="filterbar" id="filterbar"></div>
      <div id="cards"></div>
    </div>

    <div class="editor" id="editor">
      <h2 id="editorTitle">새 독서 기록</h2>
      <div class="field">
        <label>책 제목</label>
        <div class="ttl-row">
          <input type="text" id="fTitle" placeholder="예) 데미안">
          <button class="ghost" id="lookupBtn">표지 찾기</button>
        </div>
        <div class="preview-cover" id="coverPrev" style="display:none;"></div>
      </div>
      <div class="field"><label>지은이</label><input type="text" id="fAuthor" placeholder="예) 헤르만 헤세"></div>
      <div class="field">
        <div class="pub-row">
          <div class="pub-f"><label>출판사</label><input type="text" id="fPublisher" placeholder="예) 민음사"></div>
          <div class="pages-f"><label>쪽수</label><input type="number" id="fPages" placeholder="264" min="1"></div>
        </div>
      </div>
      <div class="field">
        <label>인상 깊은 구절</label>
        <div id="quotesContainer"></div>
        <button class="ghost" id="addQuoteBtn" type="button" style="margin-top:2px;font-size:13px;padding:8px 12px;">+ 구절 추가</button>
        <div class="ocr">
          <div class="hd"><span class="dot"></span> 사진에서 구절 가져오기 (드래그로 영역 선택)</div>
          <div class="acts">
            <button class="ghost" id="pickBtn">사진 선택</button>
            <button class="ghost" id="camBtn">카메라</button>
            <button id="extractBtn" disabled>선택 영역 추출 → 구절에 추가</button>
          </div>
          <input type="file" id="fileInput" accept="image/*" hidden>
          <input type="file" id="camInput" accept="image/*" capture="environment" hidden>
          <div class="canvas-box" id="canvasBox"><canvas id="canvas"></canvas></div>
          <div class="prog" id="prog"><div class="bar"><i id="barFill"></i></div><div class="lbl" id="progLbl"></div></div>
        </div>
      </div>
      <div class="field"><label>내 생각 · 감상</label>
        <textarea id="fThought" placeholder="이 책을 읽고 든 생각, 느낀 점을 적어보세요" style="min-height:110px;"></textarea></div>
      <div class="field"><label>한줄평 <span class="hintlbl">· 이 책을 한 마디로</span></label>
        <input type="text" id="fOneLiner" placeholder="예) 잃어버린 자아를 찾는 여정, 헤세가 건네는 위로"></div>
      <div class="field"><label>태그 <span class="hintlbl">· 쉼표로 구분 (예: 소설, 성장, 추천)</span></label>
        <input type="text" id="fTags" placeholder="소설, 성장, 추천"></div>
      <div class="field"><label>별점</label>
        <div class="rate" id="rate"><span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span></div></div>
      <div class="field"><label>읽은 날짜</label><input type="date" id="fDate"></div>
      <div class="footer"><button class="ghost" id="cancelBtn">취소</button><button id="saveBtn">기록 저장</button></div>
    </div>

    <p class="note">도서 정보 제공: 알라딘 인터넷서점(aladin.co.kr)</p>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import { getFirestore, collection, addDoc, doc, setDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/* ================== 1. 여기에 본인 Firebase 설정을 붙여넣으세요 ================== */
const firebaseConfig = {
  apiKey: "AIzaSyBJPVYgV2DMAbAQA7OMDcgjuIAl9N1q3zo",
  authDomain: "booklog-myogyeong.firebaseapp.com",
  projectId: "booklog-myogyeong",
  storageBucket: "booklog-myogyeong.firebasestorage.app",
  messagingSenderId: "285710665950",
  appId: "1:285710665950:web:6cd639aed4bf969c635a4f"
};
/* ============================================================================== */

const $ = id => document.getElementById(id);
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2000);}

let auth=null, db=null, provider=null, uid=null, unsub=null;
const configured = !firebaseConfig.apiKey.startsWith('YOUR_');

if(configured){
  const app = initializeApp(firebaseConfig);
  auth = getAuth(app); db = getFirestore(app); provider = new GoogleAuthProvider();
  onAuthStateChanged(auth, user=>{
    if(user){ uid=user.uid; $('userEmail').textContent=user.email||''; showApp(); subscribe(); }
    else { uid=null; if(unsub){unsub();unsub=null;} showAuth(); }
  });
} else {
  $('configWarn').style.display='block'; showAuth();
}

$('signInBtn').onclick=()=>{
  if(!configured){toast('먼저 Firebase 설정을 넣어주세요');return;}
  signInWithPopup(auth,provider).catch(e=>toast('로그인 실패: '+(e.code||e.message)));
};
$('signOutBtn').onclick=()=> signOut(auth);

function showAuth(){$('authView').style.display='flex';$('appView').style.display='none';}
function showApp(){$('authView').style.display='none';$('appView').style.display='block';showList();}

/* ---------- Firestore 구독 ---------- */
let entries=[];
function subscribe(){
  const qy = query(collection(db,'users',uid,'entries'), orderBy('createdAt','desc'));
  unsub = onSnapshot(qy, snap=>{
    entries = snap.docs.map(d=>({id:d.id, ...d.data()}));
    render();
  }, err=> toast('불러오기 오류: '+err.code));
}

/* ---------- 상태 ---------- */
let editingId=null, rating=0, coverUrl='', q='', sortMode='new', activeTag='';
const canvas=$('canvas'), ctx=canvas.getContext('2d');
let img=null, view={w:0,h:0}, sel=null, dragging=false, start=null, worker=null;
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ---------- 통계 ---------- */
function renderStats(){
  const yr=new Date().getFullYear();
  const thisYear=entries.filter(e=>e.date&&e.date.slice(0,4)==String(yr));
  const rated=entries.filter(e=>e.rating>0);
  const avg=rated.length?(rated.reduce((s,e)=>s+e.rating,0)/rated.length).toFixed(1):'–';
  const months=Array(12).fill(0);
  thisYear.forEach(e=>{const m=parseInt(e.date.slice(5,7),10)-1;if(m>=0&&m<12)months[m]++;});
  const max=Math.max(1,...months);
  const bars=months.map((c,i)=>'<div class="mc-col"><div class="mc-bar'+(c?'':' zero')+'" style="height:'+(c?Math.round(c/max*100):6)+'%" title="'+(i+1)+'월 '+c+'권"></div><div class="mc-lbl">'+(i+1)+'</div></div>').join('');
  $('stats').innerHTML='<div class="stat-nums">'+
    '<div class="stat"><b>'+entries.length+'</b><small>전체</small></div>'+
    '<div class="stat"><b>'+thisYear.length+'</b><small>'+yr+'년</small></div>'+
    '<div class="stat"><b>'+avg+'</b><small>평균 별점</small></div></div>'+
    '<div class="minichart">'+bars+'</div><div class="chart-cap">'+yr+'년 월별 독서량</div>';
}

/* ---------- 필터·정렬 ---------- */
function visible(){
  let list=entries.slice();
  if(activeTag) list=list.filter(e=>(e.tags||[]).includes(activeTag));
  if(q){const k=q.toLowerCase();list=list.filter(e=>{const qts=(e.quotes||[]).map(r=>r.text||'').join(' ');return [e.title,e.author,e.publisher,e.quote||'',e.thought,e.oneLiner||'',qts,(e.tags||[]).join(' ')].some(f=>(f||'').toLowerCase().includes(k));});}
  list.sort((a,b)=>{
    if(sortMode==='old') return (a.date||'').localeCompare(b.date||'');
    if(sortMode==='rate') return (b.rating||0)-(a.rating||0)||(b.date||'').localeCompare(a.date||'');
    if(sortMode==='title') return (a.title||'').localeCompare(b.title||'','ko');
    return (b.date||'').localeCompare(a.date||'');
  });
  return list;
}

function render(){
  renderStats();
  const fb=$('filterbar');
  if(activeTag){fb.style.display='flex';
    fb.innerHTML='태그 <span class="tag" style="cursor:default">#'+esc(activeTag)+'</span> 필터 중 <button class="clear" id="clearTag">전체 보기</button>';
    $('clearTag').onclick=()=>{activeTag='';render();};
  } else fb.style.display='none';
  const list=visible(), box=$('cards');
  if(!entries.length){box.innerHTML='<div class="empty"><div class="ic">📚</div><p>아직 기록이 없어요</p><small>읽은 책의 한 구절부터 남겨볼까요?</small></div>';return;}
  if(!list.length){box.innerHTML='<div class="empty"><div class="ic">🔍</div><p>검색 결과가 없어요</p></div>';return;}
  box.innerHTML=list.map(e=>{
    const stars=e.rating?'<span class="stars">'+'★'.repeat(e.rating)+'☆'.repeat(5-e.rating)+'</span>':'<span></span>';
    const cover=e.cover?'<img class="cover" src="'+esc(e.cover)+'" alt="">':'<div class="cover">📖</div>';
    const tags=(e.tags&&e.tags.length)?'<div class="tags">'+e.tags.map(t=>'<span class="tag" data-tag="'+esc(t)+'">#'+esc(t)+'</span>').join('')+'</div>':'';
    const oneLinerHtml=e.oneLiner?'<div class="one-liner">“'+esc(e.oneLiner)+'”</div>':'';
    const qrows=e.quotes&&e.quotes.length?e.quotes:(e.quote?[{text:e.quote,page:''}]:[]);
    const quotesHtml=qrows.map(r=>{if(!r.text)return '';const pg=r.page?'<span class="q-page-lbl">p.'+esc(r.page)+'</span>':'';return '<div class="quote-block">'+pg+'<span class="quote">'+esc(r.text)+'</span></div>';}).join('');
    return '<div class="card">'+cover+'<div class="body">'+
      '<div class="ttl">'+esc(e.title||'(제목 없음)')+'</div>'+
      '<div class="meta">'+[e.author,e.publisher,e.pages?e.pages+'쪽':null,e.date].filter(Boolean).map(esc).join(' · ')+'</div>'+
      oneLinerHtml+quotesHtml+
      (e.thought?'<div class="thought">'+esc(e.thought)+'</div>':'')+tags+
      '<div class="row2">'+stars+'<div class="card-acts">'+
        '<button class="mini" data-edit="'+e.id+'">수정</button>'+
        '<button class="mini del" data-del="'+e.id+'">삭제</button>'+
      '</div></div></div></div>';
  }).join('');
  box.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>removeEntry(b.dataset.del));
  box.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>{const e=entries.find(x=>x.id==b.dataset.edit);if(e)openEditor(e);});
  box.querySelectorAll('[data-tag]').forEach(b=>b.onclick=()=>{activeTag=b.dataset.tag;q='';$('search').value='';render();window.scrollTo(0,0);});
}
$('search').oninput=e=>{q=e.target.value.trim();render();};
$('sort').onchange=e=>{sortMode=e.target.value;render();};

/* ---------- 별점 ---------- */
function paintStars(){$('rate').querySelectorAll('span').forEach(s=>s.classList.toggle('on',+s.dataset.v<=rating));}
$('rate').querySelectorAll('span').forEach(s=>s.onclick=()=>{rating=(rating==+s.dataset.v)?+s.dataset.v-1:+s.dataset.v;paintStars();});

/* ---------- 에디터 ---------- */
function openEditor(e){
  editingId=e?e.id:null;
  $('editorTitle').textContent=e?'기록 수정':'새 독서 기록';
  $('saveBtn').textContent=e?'수정 저장':'기록 저장';
  $('fTitle').value=e?e.title||'':''; $('fAuthor').value=e?e.author||'':'';
  $('fPublisher').value=e?e.publisher||'':''; $('fPages').value=e&&e.pages?e.pages:'';
  $('fThought').value=e?e.thought||'':''; $('fOneLiner').value=e?e.oneLiner||'':'';
  $('fTags').value=e&&e.tags?e.tags.join(', '):'';
  $('fDate').value=(e&&e.date)?e.date:new Date().toISOString().slice(0,10);
  $('quotesContainer').innerHTML='';
  const qs0=e&&e.quotes?e.quotes:(e&&e.quote?[{text:e.quote,page:''}]:null);
  (qs0&&qs0.length?qs0:[{text:'',page:''}]).forEach(r=>addQuoteRow(r.text||'',r.page||''));
  rating=e?e.rating||0:0; paintStars();
  coverUrl=e?e.cover||'':'';
  if(coverUrl){$('coverPrev').style.display='flex';$('coverPrev').innerHTML='<img src="'+esc(coverUrl)+'"><span>표지가 등록돼 있어요</span>';}
  else $('coverPrev').style.display='none';
  img=null;sel=null;$('canvasBox').style.display='none';$('extractBtn').disabled=true;
  $('listView').style.display='none';$('editor').style.display='block';window.scrollTo(0,0);
}
function showList(){$('editor').style.display='none';$('listView').style.display='block';window.scrollTo(0,0);}
function addQuoteRow(text='',page=''){
  const row=document.createElement('div');row.className='quote-row';
  const ta=document.createElement('textarea');ta.className='q-text';ta.placeholder='구절을 입력하세요';ta.value=text;
  const pg=document.createElement('input');pg.type='text';pg.className='q-page';pg.placeholder='쪽';pg.value=page;
  const dl=document.createElement('button');dl.className='mini del q-del';dl.type='button';dl.title='삭제';dl.textContent='✕';
  dl.onclick=()=>{row.remove();if(!$('quotesContainer').children.length)addQuoteRow();};
  row.appendChild(ta);row.appendChild(pg);row.appendChild(dl);$('quotesContainer').appendChild(row);
}
function getQuotes(){return [...$('quotesContainer').querySelectorAll('.quote-row')].map(r=>({text:r.querySelector('.q-text').value.trim(),page:r.querySelector('.q-page').value.trim()})).filter(r=>r.text);}
$('addQuoteBtn').onclick=()=>addQuoteRow();
$('newBtn').onclick=()=>openEditor(null);
$('cancelBtn').onclick=showList;

/* ---------- 표지 찾기 (알라딘 서버리스, 후보 선택 + 정보 자동 입력) ---------- */
$('lookupBtn').onclick=async()=>{
  const t=$('fTitle').value.trim(); if(!t){toast('먼저 책 제목을 입력해주세요');return;}
  $('lookupBtn').disabled=true;$('lookupBtn').textContent='찾는 중…';
  try{
    const res=await fetch('/api/book?q='+encodeURIComponent(t));
    const data=await res.json();
    const cands=data.candidates||[];
    if(!cands.length){toast('검색 결과가 없어요 — 직접 입력해 주세요');$('coverPrev').style.display='none';return;}
    coverUrl='';
    $('coverPrev').style.display='flex';
    $('coverPrev').innerHTML=cands.map((_,i)=>{
      const c=cands[i];
      return '<div class="cand-thumb" data-i="'+i+'">'+
        '<img src="'+c.cover+'" alt="'+esc(c.title)+'">'+
        '<div class="cand-meta">'+esc(c.publisher||c.author||'')+'</div>'+
      '</div>';
    }).join('');
    $('coverPrev').querySelectorAll('.cand-thumb').forEach((el,i)=>{
      el.onclick=async()=>{
        const c=cands[i];
        coverUrl=c.cover;
        if(!$('fTitle').value)$('fTitle').value=c.title;
        if(c.author)$('fAuthor').value=c.author;
        if(c.publisher)$('fPublisher').value=c.publisher;
        $('coverPrev').querySelectorAll('.cand-thumb').forEach(x=>x.classList.remove('sel'));
        el.classList.add('sel');
        toast('표지를 선택했어요 · 저장하면 함께 기록돼요');
        if(c.isbn13){
          try{
            const r2=await fetch('/api/book?isbn='+encodeURIComponent(c.isbn13));
            const d2=await r2.json();
            if(d2.page)$('fPages').value=d2.page;
          }catch{}
        }
      };
    });
  }catch(e){toast('표지를 못 불러왔어요');}
  finally{$('lookupBtn').disabled=false;$('lookupBtn').textContent='표지 찾기';}
};

/* ---------- OCR ---------- */
function loadFile(file){if(!file)return;const url=URL.createObjectURL(file);const im=new Image();im.onload=()=>{img=im;setupCanvas();URL.revokeObjectURL(url);};im.onerror=()=>toast('이미지를 불러오지 못했어요');im.src=url;}
function setupCanvas(){$('canvasBox').style.display='block';sel=null;$('extractBtn').disabled=true;
  const boxW=canvas.parentElement.clientWidth,ratio=img.naturalHeight/img.naturalWidth;
  view.w=boxW;view.h=Math.round(boxW*ratio);const dpr=Math.min(window.devicePixelRatio||1,2);
  canvas.width=view.w*dpr;canvas.height=view.h*dpr;canvas.style.height=view.h+'px';ctx.setTransform(dpr,0,0,dpr,0,0);draw();}
function draw(){ctx.clearRect(0,0,view.w,view.h);ctx.drawImage(img,0,0,view.w,view.h);
  if(sel){ctx.fillStyle='rgba(20,20,30,.45)';ctx.fillRect(0,0,view.w,view.h);
    ctx.drawImage(img,sel.x/view.w*img.naturalWidth,sel.y/view.h*img.naturalHeight,sel.w/view.w*img.naturalWidth,sel.h/view.h*img.naturalHeight,sel.x,sel.y,sel.w,sel.h);
    ctx.strokeStyle='#E6CE00';ctx.lineWidth=2;ctx.strokeRect(sel.x,sel.y,sel.w,sel.h);
    ctx.fillStyle='rgba(255,233,77,.18)';ctx.fillRect(sel.x,sel.y,sel.w,sel.h);}}
function pos(e){const r=canvas.getBoundingClientRect();const p=e.touches?e.touches[0]:e;return{x:Math.max(0,Math.min(view.w,p.clientX-r.left)),y:Math.max(0,Math.min(view.h,p.clientY-r.top))};}
function down(e){if(!img)return;e.preventDefault();dragging=true;start=pos(e);sel=null;}
function move(e){if(!dragging)return;e.preventDefault();const p=pos(e);sel={x:Math.min(start.x,p.x),y:Math.min(start.y,p.y),w:Math.abs(p.x-start.x),h:Math.abs(p.y-start.y)};draw();}
function up(){if(!dragging)return;dragging=false;if(sel&&sel.w>12&&sel.h>12)$('extractBtn').disabled=false;else{sel=null;$('extractBtn').disabled=true;draw();}}
canvas.addEventListener('mousedown',down);window.addEventListener('mousemove',move);window.addEventListener('mouseup',up);
canvas.addEventListener('touchstart',down,{passive:false});canvas.addEventListener('touchmove',move,{passive:false});canvas.addEventListener('touchend',up);
function crop(){const sx=sel.x/view.w*img.naturalWidth,sy=sel.y/view.h*img.naturalHeight,sw=sel.w/view.w*img.naturalWidth,sh=sel.h/view.h*img.naturalHeight;
  const c=document.createElement('canvas'),scale=sw<1000?2:1;c.width=sw*scale;c.height=sh*scale;
  c.getContext('2d').drawImage(img,sx,sy,sw,sh,0,0,c.width,c.height);return c.toDataURL('image/png');}
$('extractBtn').onclick=async()=>{if(!sel)return;
  $('extractBtn').disabled=true;$('prog').style.display='block';$('barFill').style.width='0%';$('progLbl').textContent='엔진 준비 중… (처음엔 몇 초)';
  try{if(!worker){worker=await Tesseract.createWorker('kor+eng',1,{logger:m=>{
    if(m.status==='recognizing text'){const p=Math.round(m.progress*100);$('barFill').style.width=p+'%';$('progLbl').textContent='글자 읽는 중… '+p+'%';}
    else $('progLbl').textContent=m.status+'…';}});}
    const {data}=await worker.recognize(crop());const text=(data.text||'').trim().replace(/\s*\n\s*/g,' ');
    if(text){const rows=$('quotesContainer').querySelectorAll('.quote-row');const lastTA=rows.length?rows[rows.length-1].querySelector('.q-text'):null;if(lastTA){const cur=lastTA.value.trim();lastTA.value=cur?cur+'\n'+text:text;}toast('구절에 추가했어요');}
    else toast('글자를 못 찾았어요 — 영역을 더 넓게 잡아보세요');
  }catch(e){console.error(e);toast('인식 중 오류');}
  finally{$('prog').style.display='none';$('extractBtn').disabled=false;}};
$('pickBtn').onclick=()=>$('fileInput').click();
$('camBtn').onclick=()=>$('camInput').click();
$('fileInput').onchange=e=>loadFile(e.target.files[0]);
$('camInput').onchange=e=>loadFile(e.target.files[0]);

/* ---------- 저장/삭제 (Firestore) ---------- */
function parseTags(s){return [...new Set((s||'').split(',').map(t=>t.trim().replace(/^#/,'')).filter(Boolean))];}
$('saveBtn').onclick=async()=>{
  const title=$('fTitle').value.trim(),thought=$('fThought').value.trim();
  const quotesArr=getQuotes();
  if(!title&&!thought&&!quotesArr.length){toast('제목이나 내용을 입력해주세요');return;}
  const pages=$('fPages').value?parseInt($('fPages').value,10)||0:0;
  const payload={title,author:$('fAuthor').value.trim(),publisher:$('fPublisher').value.trim(),pages,cover:coverUrl,quotes:quotesArr,oneLiner:$('fOneLiner').value.trim(),thought,rating,tags:parseTags($('fTags').value),date:$('fDate').value};
  $('saveBtn').disabled=true;
  try{
    if(editingId){ await setDoc(doc(db,'users',uid,'entries',editingId), payload, {merge:true}); toast('수정했어요'); }
    else { await addDoc(collection(db,'users',uid,'entries'), {...payload, createdAt:serverTimestamp()}); toast('기록을 저장했어요'); }
    showList();  // 목록은 onSnapshot이 자동 갱신
  }catch(e){toast('저장 실패: '+(e.code||e.message));}
  finally{$('saveBtn').disabled=false;}
};
async function removeEntry(id){
  if(!confirm('이 기록을 삭제할까요?'))return;
  try{ await deleteDoc(doc(db,'users',uid,'entries',id)); }
  catch(e){ toast('삭제 실패: '+(e.code||e.message)); }
}

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));
}
</script>
